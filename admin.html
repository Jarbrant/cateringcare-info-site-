<!DOCTYPE html>
<html>
<head>
<title>CateringCare Admin</title>
<style>

body{
font-family:Arial;
max-width:800px;
margin:auto;
padding:40px;
background:#f5f7f6;
}

h1{
color:#2f7d59;
}

/* INLOGGNING */

.login-box{
max-width:400px;
margin:80px auto;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
text-align:center;
}

.login-box h1{
margin-bottom:10px;
}

.login-box p{
color:#666;
margin-bottom:25px;
}

.login-input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
box-sizing:border-box;
margin-bottom:15px;
}

.login-button{
width:100%;
padding:14px;
font-size:16px;
background:#2f7d59;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.login-button:hover{
background:#24614a;
}

.login-error{
color:#dc3545;
margin-top:10px;
display:none;
}

/* ADMIN PANEL */

.admin-panel{
display:none;
}

textarea{
width:100%;
height:400px;
font-size:15px;
padding:15px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
font-family:monospace;
line-height:1.6;
}

button{
padding:12px 24px;
font-size:16px;
background:#2f7d59;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:15px;
margin-right:10px;
}

button:hover{
background:#24614a;
}

.logout-btn{
background:#dc3545;
float:right;
margin-top:0;
}

.logout-btn:hover{
background:#b02a37;
}

#status{
margin-top:15px;
padding:10px;
border-radius:6px;
display:none;
}

.success{
background:#d4edda;
color:#155724;
}

.error{
background:#f8d7da;
color:#721c24;
}

</style>
</head>

<body>

<!-- ======================== -->
<!-- INLOGGNINGSSIDA          -->
<!-- ======================== -->

<div id="loginPage" class="login-box">

<h1>🔒</h1>
<h1>CateringCare Admin</h1>
<p>Logga in för att hantera FAQ</p>

<input
  id="password"
  type="password"
  class="login-input"
  placeholder="Ange lösenord..."
  onkeydown="if(event.key==='Enter')login()"
>

<button class="login-button" onclick="login()">Logga in</button>

<p id="loginError" class="login-error">❌ Fel lösenord</p>

</div>

<!-- ======================== -->
<!-- ADMIN-PANELEN            -->
<!-- ======================== -->

<div id="adminPanel" class="admin-panel">

<button class="logout-btn" onclick="logout()">🚪 Logga ut</button>

<h1>🍽️ CateringCare FAQ Admin</h1>

<p>Här kan du lägga till eller uppdatera AI-kunskap (sparas i Cloudflare KV).</p>
<p><small>💡 Tips: MD-filer på GitHub läses också automatiskt. Det här är för extra FAQ-data.</small></p>

<button onclick="loadFaq()">📥 Ladda befintlig FAQ</button>
<button onclick="save()">💾 Spara FAQ</button>

<div id="status"></div>

<br><br>

<textarea id="faq" placeholder="Skriv FAQ-information här..."></textarea>

</div>

<script>

// ⭐ DIN CLOUDFLARE WORKER URL
const WORKER_URL = "https://cateringcare-info-site-01.andersmenyit.workers.dev"

// Lösenordet sparas i sessionen så man slipper logga in igen vid sidladdning
let adminToken = sessionStorage.getItem("adminToken") || ""

// Kolla om redan inloggad
if(adminToken){
  showAdmin()
}

/* ========================
   INLOGGNING
   ======================== */

async function login(){
  const password = document.getElementById("password").value

  try {
    const res = await fetch(WORKER_URL + "/admin/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password })
    })

    const data = await res.json()

    if(data.success){
      adminToken = data.token
      sessionStorage.setItem("adminToken", adminToken)
      document.getElementById("loginError").style.display = "none"
      showAdmin()
    } else {
      document.getElementById("loginError").style.display = "block"
    }
  } catch(err) {
    document.getElementById("loginError").textContent = "❌ Kunde inte ansluta"
    document.getElementById("loginError").style.display = "block"
  }
}

function showAdmin(){
  document.getElementById("loginPage").style.display = "none"
  document.getElementById("adminPanel").style.display = "block"
  loadFaq()
}

function logout(){
  adminToken = ""
  sessionStorage.removeItem("adminToken")
  document.getElementById("loginPage").style.display = "block"
  document.getElementById("adminPanel").style.display = "none"
  document.getElementById("password").value = ""
}

/* ========================
   FAQ FUNKTIONER
   ======================== */

function showStatus(message, type) {
  const el = document.getElementById("status")
  el.textContent = message
  el.className = type
  el.style.display = "block"
  setTimeout(() => { el.style.display = "none" }, 3000)
}

async function loadFaq(){
  try {
    const res = await fetch(WORKER_URL + "/admin/get", {
      headers: { "Authorization": "Bearer " + adminToken }
    })
    const data = await res.json()

    if(data.error === "unauthorized"){
      logout()
      return
    }

    document.getElementById("faq").value = data.faq || ""
    showStatus("✅ FAQ laddad!", "success")
  } catch(err) {
    showStatus("❌ Kunde inte ladda FAQ: " + err.message, "error")
  }
}

async function save(){
  const text = document.getElementById("faq").value

  try {
    const res = await fetch(WORKER_URL + "/admin/save", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + adminToken
      },
      body: JSON.stringify({ text })
    })

    const data = await res.json()

    if(data.error === "unauthorized"){
      logout()
      return
    }

    if(data.status === "saved") {
      showStatus("✅ FAQ sparad!", "success")
    } else {
      showStatus("❌ Fel: " + JSON.stringify(data), "error")
    }
  } catch(err) {
    showStatus("❌ Kunde inte spara: " + err.message, "error")
  }
}

</script>

</body>
</html>
